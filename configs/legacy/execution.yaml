# Execution configuration for multi-exchange trading
exchanges:
  binance:
    enabled: true
    adapter_type: "binance"  # binance | coinbase | simulated
    api_key: "${BINANCE_API_KEY}"
    api_secret: "${BINANCE_API_SECRET}"
    testnet: true
  coinbase:
    enabled: true
    adapter_type: "coinbase"
    api_key: "${COINBASE_API_KEY}"
    api_secret: "${COINBASE_API_SECRET}"
    passphrase: "${COINBASE_PASSPHRASE}"
    sandbox: true
  simulated:
    enabled: true
    adapter_type: "simulated"
    initial_prices:
      AAPL: 150.0
      MSFT: 300.0

routing:
  mode: "smart"  # smart | best_price | manual
  max_order_size: 10000.0
  split_size: 5000.0
  slicing:
    default_mode: "VWAP_ADAPTIVE"
    max_participation_rate: 0.1
    urgency_sensitivity: 1.5
  scheduler:
    horizon_default: 20
    risk_aversion: 0.1
    convergence_tol: 1e-6

risk_limits:
  max_order_size: 100000.0
  max_exposure_per_exchange: 50000.0
  max_total_exposure: 200000.0

retry:
  max_attempts: 3
  delay_base: 0.1  # seconds
  backoff_factor: 2.0

objective:
  impact_k: 0.1
  impact_alpha: 0.5
  timing_lambda: 0.01
  risk_gamma: 0.1
  base_fee: 0.0001 # 1bps

cost_model:
  impact_k: 0.15
  timing_alpha: 0.05
  fixed_fee: 1.0  # USD
  prop_fee: 0.0002 # 2bps

microstructure:
  imbalance:
    n_levels: 5
    lambda_decay: 0.5
  toxic_flow:
    window_size: 50
    impact_horizon: 5
    threshold: 0.7
  queue_model:
    cancellation_coeff: 0.5
    default_intensity: 10.0
  spread_model:
    window_size: 20
    alpha: 0.1
    beta: 0.05