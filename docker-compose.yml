services:
  app:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - timescaledb
      - mlflow

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sanauto
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=qtrader
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000

volumes:
  timescaledb_data:

networks:
  sanauto-production-net:
    external: true
