services:
  orchestrator:
    build: .
    command: ["uv", "run", "python", "scripts/orchestrator_service.py"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - SERVICE_TYPE=ORCHESTRATOR
    restart: always
    depends_on:
      - timescaledb
      - mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  execution:
    build: .
    command: ["uv", "run", "python", "scripts/execution_service.py"]
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - SERVICE_TYPE=EXECUTION
    restart: always
    depends_on:
      - timescaledb

  ml_engine:
    build: .
    command: ["uv", "run", "python", "scripts/ml_service.py"]
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - SERVICE_TYPE=ML
    restart: always
    depends_on:
      - mlflow

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    platform: linux/arm64
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=sanauto
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=qtrader
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: always

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    platform: linux/arm64
    ports:
      - "5050:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    restart: always

volumes:
  timescaledb_data:

networks:
  default:
    name: sanauto-production-net
