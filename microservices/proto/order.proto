syntax = "proto3";

package qtrader.v2;

message OrderCommand {
  string order_id = 1;      // UUID generated by order-command-service
  string session_id = 2;    // Current trading session ID
  string trace_id = 3;      // Forensic trace ID for lineage
  string symbol = 4;        // e.g., "BTCUSDT"
  string action = 5;        // BUY, SELL
  string type = 6;          // MARKET, LIMIT
  double quantity = 7;
  double price = 8;
  string idempotency_key = 9;
  int64 timestamp_ns = 10;
}

message OrderResponse {
  string order_id = 1;
  string status = 2;        // ACCEPTED, REJECTED
  string reason = 3;
}
